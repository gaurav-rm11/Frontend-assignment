<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toast" id="toast">
    <div class="toast-header">
        <img src="../assets/images/icon-success-check.svg" alt="">
        <span>Message Sent!</span>
    </div>
    <p>
        Thanks for completing the form. We'll be in touch soon!
    </p>
</div>
<form class="contactform" id="contactForm">

    <h1 class="header">Contact Us</h1>
    <div class="name">
        <div class="first">
            <label for="firstname">First Name <span>*</span></label>
            <input type="text" id="firstname">
            <small class="error"></small>
        </div>

        <div class="last">
            <label for="lastname">Last Name <span>*</span></label>
            <input type="text" id="lastname">
            <small class="error"></small>
        </div>

    </div>

    <div class="email">
        <label for="email">Email Address <span>*</span></label>
        <input type="email" id="email">
        <small class="error"></small>
    </div>

    <div class="query">
        <label>Query Type <span>*</span></label>

        <div class="query-options">
            <label class="option">
                <input type="radio" name="queryType" value="general">
                General Enquiry
            </label>

            <label class="option">
                <input type="radio" name="queryType" value="support">
                Support Request
            </label>
        </div>

        <small class="error query-error"></small>
    </div>

    <div class="msg">
        <label for="message">Message <span>*</span></label>
        <textarea id="message" rows="5"></textarea>
        <small class="error"></small>
    </div>

    <div class="consent">
        <label>
            <input type="checkbox" id="consent">
            I consent to being contacted by the team <span>*</span>
        </label>

        <small class="error consent-error"></small>
    </div>

    <button type="submit" class="submit">Submit</button>
</form>
<script src="script.js"></script>
</body>
</html>
